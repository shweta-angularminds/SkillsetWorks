<div class="bg-white w-100 h-100 p-3">
  <div
    class="header border-bottom pb-2"
    routerLink="/view-job/{{ application.job_id }}"
  >
    <h5>{{ application.designation }}</h5>
    <h6>{{ application.company_name }}</h6>
  </div>
  <div class="mt-3">
    <label class="fw-bold text-primary" style="font-size: 1rem"
      >Application status</label
    >
  </div>
  <div class="mt-3 w-75">
    <div class="d-flex align-items-center justify-content-between">
      <div class="step">
        <div class="circle"></div>
        <div class="d-flex flex-column mt-2">
          <label class="step-label">Applied</label>
          <label class="step-date">{{ application.createdAt | date }}</label>
        </div>
      </div>

      <div class="line"></div>

      <div class="step">
        <div class="circle" [ngClass]="application.status"></div>
        <div class="d-flex flex-column mt-2">
          <label class="step-label">{{ application.status }}</label>
          <label class="step-date">{{ application.updatedAt | date }}</label>
        </div>
      </div>
      
    </div>
  </div>
</div>
