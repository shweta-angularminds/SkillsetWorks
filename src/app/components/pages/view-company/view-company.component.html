<div class="container-fluid p-0">
  <app-navbar></app-navbar>
  <div class="main w-100 vh-100 py-3">
    <div class="container">
      <div class="row bg-white p-2">
        <div class="d-flex align-items-center p-2">
          <div class="col col-lg-2 col-md-3 col-sm-4 col-xs-2">
            <img
              [src]="this.company?.companyLogo"
              class="img-fluid"
            />
          </div>
          <div class="col col-lg-7 col-md-6 col-sm-6 col-xs-7">
            <h5>{{ company?.companyName }}</h5>
            <h6>
              <i class="fa-solid fa-envelope me-2"></i>{{ company?.email }}
            </h6>
          </div>
        </div>
      </div>
      <div class="row bg-white mt-3">
        <div class="header p-3">
          <!-- <li [ngClass]="{ boldBlack: isClick }" (click)="isClick = true">
            Overview
          </li> -->
          <li [ngClass]="{ boldBlack: !isClick }" (click)="isClick = false">
            jobs
          </li>
        </div>
        <div class="content">
          <!-- <p class="mt-3" *ngIf="isClick">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Necessitatibus, aliquid? Molestias quia aspernatur saepe harum illo
            at, rerum veritatis maiores fuga numquam mollitia culpa facilis
            doloribus! Magni explicabo rerum fugit.
          </p> -->
          <div class="jobs mt-3" *ngIf="!isClick">
            <div class="p-2" *ngIf="jobs.length <= 0">
              <h2>No Job Openings right now but stay connected!</h2>
            </div>
            <div class="p-2 mt-2 mb-2 border" *ngIf="jobs.length > 0">
              <label class="text-dark fw-bold"
                >{{ jobs.length }} Job openings at
                {{ company?.companyName }}</label
              >
              <div class="d-flex mt-3 justify-content-between flex-wrap">
                <!-- department -->
                <div class="d-flex mb-2">
                  <div class="dropdown">
                    <button
                      class="btn btn-secondary dropdown-toggle"
                      type="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false"
                    >
                      Department
                    </button>
                    <ul class="dropdown-menu">
                      <li
                        *ngFor="let department of uniqueDepartments"
                        (click)="setQuery('department', department)"
                      >
                        {{ department }}
                      </li>
                      <li (click)="setQuery('department', '')">All</li>
                    </ul>
                  </div>
                  <!-- experience -->
                  <div class="dropdown">
                    <button
                      class="btn btn-secondary dropdown-toggle"
                      type="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false"
                    >
                      Experience
                    </button>
                    <ul class="dropdown-menu">
                      <li
                        *ngFor="let experience of uniqueExperiences"
                        (click)="setQuery('experience', experience)"
                      >
                        {{ experience }}
                      </li>
                      <br />
                      <li (click)="setQuery('experience', '')">All</li>
                    </ul>
                  </div>
                </div>
                <div class="clear">
                  <span
                    style="cursor: pointer"
                    class="text-primary fw-bold"
                    (click)="setQuery('filter', 'clear')"
                  >
                    Clear All
                  </span>
                </div>
              </div>
            </div>
            <div
              class="card mb-3 shadow-sm"
              *ngFor="let job of jobs| paginate : { itemsPerPage: 5, currentPage: p };"
              routerLink="/view-job/{{ job._id }}"
            >
              <div class="d-flex justify-content-between flex-wrap">
                <h4>{{ job.designation }}</h4>
                <!-- <button class="">Apply</button> -->
              </div>

              <div class="d-flex">
                <span class="col col-lg-2 col-md-3 col-5 me-2">
                  <i class="fa-solid fa-briefcase"></i
                  ><label>{{ job.experience }}</label></span
                >
                <span class="col col-lg-1 col-3"
                  ><i class="fa-solid fa-indian-rupee-sign"></i
                  ><label>{{ job.salary }}</label></span
                >
                <span class="col col-lg-1 col-3">
                  <i class="fa-solid fa-location-dot"></i
                  ><label>{{ job.location }}</label></span
                >
              </div>
              <span
                ><i class="fa-regular fa-clipboard"></i>{{ job.skills }}</span
              >
              <span class="text-grey mt-1"
                >{{ job.updatedAt | dateDiff }}
              </span>
            </div>
          </div>
          <pagination-controls
            class="my-pagination p-3 text-end"
            (pageChange)="p = $event"
          ></pagination-controls>
        </div>
      </div>
    </div>
  </div>
</div>
