<div class="container-fluid">
  <app-navbar></app-navbar>
  <div class="w-100 mt-4">
    <img src="/assets/images/company2.jpg" style="width: 100%; height: 300px" />
  </div>
  <div class="main mt-4 row text-center">
    <h4 class="m-3 text-main fw-bold">Explore By Company</h4>
    <div
      *ngFor="let company of companies"
      class="col-12 col-md-6 col-lg-3 mb-4"
    >
      <a routerLink="/view-company/{{ company._id }}">
        <div class="card text-center shadow" style="width: 100%">
          <div class="d-flex justify-content-center mt-3">
            <img
              [src]="company.companyLogo"
              class="card-img-top"
              alt="..."
              style="width: 32%; height: 11vh; margin: 10px"
            />
          </div>
          <div class="card-body" *ngIf="company">
            <h5 class="card-title fw-bold">{{ company?.companyName }}</h5>
            <p class="card-text">{{ company?.email }}</p>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
